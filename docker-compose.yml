services:
  postgres:
    image: postgres:16
    container_name: compostiq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: compostiq
      POSTGRES_USER: compostiq
      POSTGRES_PASSWORD: compostiq123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: